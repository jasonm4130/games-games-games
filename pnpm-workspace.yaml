packages:
  - apps/worker
  - tools/operator-scripts
# tools/rulebook-prep is a Python (uv) project — intentionally NOT a pnpm package, so it
# stays out of the workspace and out of Cloudflare Builds' install at the apps/worker root.

# Build-script approvals (pnpm 11). These deps ship native binaries / run install
# scripts in this toolchain — workerd is the Workers runtime used by the Vite plugin
# and the Vitest pool, esbuild backs the bundler.
allowBuilds:
  '@mongodb-js/zstd': true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  # Pulled in by @huggingface/transformers, used ONLY for its pure-JS bge-m3 tokenizer in
  # scripts/ingest.ts. These build native ONNX bindings we never exercise (no inference), so skip.
  onnxruntime-node: false
  protobufjs: false
  sharp: true
  workerd: true
